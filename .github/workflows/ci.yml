name: CI — AttoVisio

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

jobs:
  # ────────────────────────────────────────────
  # 1. Tests sur toutes les versions Python
  # ────────────────────────────────────────────
  test:
    name: Tests Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Configurer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🧪 Lancer les tests
        run: |
          pytest tests/ -v --tb=short --cov=attovisio --cov-report=xml --cov-report=term-missing

      - name: 📊 Uploader la couverture vers Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────
  # 2. Vérification du style (lint)
  # ────────────────────────────────────────────
  lint:
    name: Lint & Formatage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Installer les outils de lint
        run: |
          pip install flake8 black mypy

      - name: 🎨 Vérifier le formatage (black)
        run: black --check --diff attovisio/ tests/

      - name: 🔍 Analyse PEP8 (flake8)
        run: flake8 attovisio/ --max-line-length=100 --extend-ignore=E203,W503

      - name: 🔎 Vérification des types (mypy)
        run: mypy attovisio/ --ignore-missing-imports
        continue-on-error: true   # mypy est informatif, pas bloquant

  # ────────────────────────────────────────────
  # 3. Build du package
  # ────────────────────────────────────────────
  build:
    name: Build du package
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installer build
        run: pip install build twine

      - name: 🔨 Construire le package (sdist + wheel)
        run: python -m build

      - name: ✅ Vérifier le package avec twine
        run: twine check dist/*

      - name: 💾 Sauvegarder les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/

  # ────────────────────────────────────────────
  # 4. Publication sur PyPI (uniquement sur release)
  # ────────────────────────────────────────────
  publish:
    name: Publier sur PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published'

    environment:
      name: pypi
      url: https://pypi.org/project/attovisio/

    permissions:
      id-token: write   # Nécessaire pour OIDC (authentification sans mot de passe)

    steps:
      - name: 📥 Télécharger les artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: 🚀 Publier sur PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Utilise OIDC Trusted Publisher — aucun token à configurer !
        # Configurez votre projet sur https://pypi.org/manage/account/publishing/
